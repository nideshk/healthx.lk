name: Auto Apply PR Template

on:
  pull_request:
    types: [opened, edited]

jobs:
  apply-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Detect Branch Type
        id: detect
        run: |
          BRANCH_NAME="${GITHUB_HEAD_REF}"
          if [[ "$BRANCH_NAME" == feature/* ]]; then
            echo "template_file=.github/PULL_REQUEST_TEMPLATE/feature.md" >> $GITHUB_ENV
          elif [[ "$BRANCH_NAME" == bugfix/* ]]; then
            echo "template_file=.github/PULL_REQUEST_TEMPLATE/bugfix.md" >> $GITHUB_ENV
          else
            echo "template_file=" >> $GITHUB_ENV
          fi

      - name: Load Template and Update PR
        if: env.template_file != ''
        run: |
          CONTENT=$(cat ${{ env.template_file }} | jq -Rs .)
          gh api \
            repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} \
            -f body="$CONTENT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
